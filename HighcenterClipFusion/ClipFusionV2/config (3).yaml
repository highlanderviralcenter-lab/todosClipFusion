# ClipFusion Viral Pro — Configuração para i5-6200U + Intel HD 520

hardware:
  encoder_preferido: "auto"    # auto | h264_vaapi | libx264
  max_ram_gb: 6                # Reserva 2GB para o sistema
  usar_gpu_intel: true

whisper:
  modelo: "base"
  idioma: "pt"
  dispositivo: "cpu"           # cpu — NVIDIA desabilitada

render:
  preset: "fast"               # ultrafast | fast | medium
  crf: 23                      # 18=alta qualidade, 23=equilíbrio, 28=menor arquivo
  usar_vaapi: true

anti_copy:
  nivel: "basic"               # none | basic | anti_ai | maximum

gui:
  tema_escuro: true
  janela_inicio: "1120x800"

platforms:
  - tiktok
  - reels
  - shorts
